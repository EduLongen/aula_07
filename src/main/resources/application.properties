# =============================================================================
# ClientHub — Configurações comuns a todos os perfis
# =============================================================================
# Este arquivo é sempre carregado. As configurações específicas do banco ficam
# nos arquivos de perfil: application-postgres.properties ou application-h2.properties

# Nome da aplicação (aparece nos logs)
spring.application.name=clienthub

# Porta do servidor web embutido (Tomcat)
server.port=8080

# Desabilita o cache dos templates Thymeleaf em desenvolvimento.
# Em produção, mudar para true para melhorar performance.
spring.thymeleaf.cache=false

# Caminho onde o JSON da especificação OpenAPI é gerado (Swagger)
springdoc.api-docs.path=/api-docs

# Caminho da interface visual do Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Exibe as queries SQL geradas pelo Hibernate no console (útil para aprendizado)
# Em produção, considere mudar para false para não poluir os logs
spring.jpa.show-sql=true

# Formata o SQL gerado com indentação para melhor legibilidade
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# Perfil ativo: define qual application-{perfil}.properties será carregado
# =============================================================================
# "postgres" → usa PostgreSQL (requer Docker ou banco local)
# "h2"       → usa H2 em arquivo (sem dependência externa)
spring.profiles.active=postgres
