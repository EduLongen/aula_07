# =============================================================================
# Perfil "h2" — configuração para H2 (banco em arquivo, sem Docker)
# =============================================================================
# Este arquivo é carregado quando: ./mvnw spring-boot:run -Dspring.profiles.active=h2
#
# H2 é um banco de dados Java que roda dentro da própria JVM.
# Ideal para desenvolvimento rápido e demos sem dependência de Docker.
#
# Modo "file" (jdbc:h2:file:./data/clienthub):
#   - Os dados persistem entre reinicializações da aplicação
#   - O arquivo fica em ./data/clienthub.mv.db
#
# Modo "mem" (jdbc:h2:mem:clienthub) seria em memória:
#   - Mais rápido, mas perde tudo quando a aplicação para

# Banco em arquivo → persiste dados entre restarts
spring.datasource.url=jdbc:h2:file:./data/clienthub

# Driver H2 (fornecido pela dependência com.h2database:h2 no pom.xml)
spring.datasource.driver-class-name=org.h2.Driver

# Credenciais padrão do H2
spring.datasource.username=sa
spring.datasource.password=

# Dialeto SQL do H2 — instrui o Hibernate a gerar SQL compatível com H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cria/atualiza tabelas automaticamente (mesmo conceito do perfil postgres)
spring.jpa.hibernate.ddl-auto=update

# =============================================================================
# Console Web do H2 — interface visual para explorar o banco
# =============================================================================
# Acesse: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:file:./data/clienthub
# Usuário: sa  |  Senha: (vazio)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
