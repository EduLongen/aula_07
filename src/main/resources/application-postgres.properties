# =============================================================================
# Perfil "postgres" — configuração para PostgreSQL
# =============================================================================
# Este arquivo é carregado quando spring.profiles.active=postgres
# (configurado no application.properties ou pela variável de ambiente)
#
# No Docker, as variáveis SPRING_DATASOURCE_* no docker-compose.yml
# sobrescrevem esses valores automaticamente.

# =============================================================================
# CONCEITO: JDBC URL
# =============================================================================
# jdbc:postgresql://host:porta/nome_do_banco
#   - postgresql  → driver a ser usado
#   - localhost   → servidor do banco (em Docker, o nome do serviço: "postgres")
#   - 5432        → porta padrão do PostgreSQL
#   - clienthub   → nome do banco de dados (criado pelo Docker Compose)
spring.datasource.url=jdbc:postgresql://localhost:5432/clienthub

# Usuário e senha definidos no docker-compose.yml (POSTGRES_USER e POSTGRES_PASSWORD)
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# Driver JDBC do PostgreSQL (fornecido pela dependência org.postgresql:postgresql no pom.xml)
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialeto SQL do Hibernate para PostgreSQL
# O Hibernate usa isso para gerar SQL com sintaxe correta para cada banco
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =============================================================================
# CONCEITO: ddl-auto — Como o Hibernate gerencia o schema do banco
# =============================================================================
# none     → não faz nada (banco gerenciado manualmente)
# validate → valida se as tabelas existem, mas não cria/altera
# update   → cria tabelas que não existem e adiciona colunas novas,
#            MAS NUNCA remove colunas ou tabelas existentes (seguro para dev)
# create   → recria todas as tabelas ao iniciar (perde dados!)
# create-drop → recria ao iniciar e dropa ao encerrar (para testes)
#
# Para produção: use "none" ou "validate" + Flyway/Liquibase para migrações
spring.jpa.hibernate.ddl-auto=update
