<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Usuário — ClientHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-container">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/messages :: messages}"></div>

        <div class="page-header">
            <!--
            Se o DTO tem ID → edição. Se não tem → criação.
            O operador Elvis (?:) retorna "Editar" se id não for null.
            -->
            <h1 th:text="${usuarioForm.id != null} ? 'Editar Usuário' : 'Novo Usuário'">Novo Usuário</h1>
            <a th:href="@{/usuarios}" class="btn btn-secondary">Voltar</a>
        </div>

        <div class="form-container">
            <!--
            th:object="${usuarioForm}" faz o binding entre o formulário e o DTO.
            th:field="*{nome}" é atalho para name="nome" + value="${usuarioForm.nome}".
            O hidden field "id" distingue criação (null) de edição (preenchido).
            -->
            <form th:action="@{/usuarios/salvar}" th:object="${usuarioForm}" method="post">
                <!-- Campo hidden: id do usuário (null na criação, preenchido na edição) -->
                <input type="hidden" th:field="*{id}">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" th:field="*{nome}"
                               th:classappend="${#fields.hasErrors('nome')} ? 'campo-erro'"
                               placeholder="Nome completo">
                        <span class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'campo-erro'"
                               placeholder="usuario@email.com">
                        <span class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    </div>
                    <div class="form-group">
                        <label for="senha" th:text="${usuarioForm.id != null} ? 'Senha (deixe vazio para manter)' : 'Senha'">Senha</label>
                        <input type="password" id="senha" th:field="*{senha}"
                               th:classappend="${#fields.hasErrors('senha')} ? 'campo-erro'"
                               th:placeholder="${usuarioForm.id != null} ? 'Deixe vazio para manter a atual' : 'Mínimo 6 caracteres'">
                        <span class="error-message" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></span>
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <!--
                        Select com os valores do enum Role (ADMIN, GESTOR, USUARIO).
                        Ao mudar a role, o JavaScript habilita/desabilita o campo empresa.
                        -->
                        <select id="role" th:field="*{role}"
                                th:classappend="${#fields.hasErrors('role')} ? 'campo-erro'"
                                onchange="toggleEmpresa()">
                            <option value="">Selecione a role</option>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">ADMIN</option>
                        </select>
                        <span class="error-message" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
                    </div>
                    <div class="form-group form-full">
                        <label for="empresaId">Empresa</label>
                        <!--
                        Select com empresas ativas.
                        Desabilitado quando role = ADMIN (admin é global, sem empresa).
                        Obrigatório quando role = GESTOR ou USUARIO.
                        -->
                        <select id="empresaId" th:field="*{empresaId}"
                                th:classappend="${#fields.hasErrors('empresaId')} ? 'campo-erro'">
                            <option value="">Selecione a empresa</option>
                            <option th:each="emp : ${empresas}" th:value="${emp.id}" th:text="${emp.nome}">Empresa</option>
                        </select>
                        <span class="error-message" th:if="${#fields.hasErrors('empresaId')}" th:errors="*{empresaId}"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>

<!--
JavaScript: habilita/desabilita o campo empresa conforme a role selecionada.
- ADMIN → empresa desabilitada e limpa (admin não tem empresa)
- GESTOR/USUARIO → empresa habilitada e obrigatória
-->
<script>
    function toggleEmpresa() {
        var role = document.getElementById('role').value;
        var empresaSelect = document.getElementById('empresaId');

        if (role === 'ADMIN') {
            empresaSelect.disabled = true;
            empresaSelect.value = '';
            empresaSelect.required = false;
        } else {
            empresaSelect.disabled = false;
            empresaSelect.required = true;
        }
    }

    // Executa ao carregar a página para aplicar o estado correto
    // (importante na edição, quando o formulário já vem preenchido)
    document.addEventListener('DOMContentLoaded', function() {
        toggleEmpresa();

        // Se o select empresa está desabilitado, o valor não é enviado no form.
        // Precisamos reabilitá-lo antes do submit para que o valor null seja enviado.
        document.querySelector('form').addEventListener('submit', function() {
            document.getElementById('empresaId').disabled = false;
        });
    });
</script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
