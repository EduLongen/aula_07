<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Usuários — ClientHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-container">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/messages :: messages}"></div>

        <div class="page-header">
            <h1>Usuários</h1>
            <a th:href="@{/usuarios/novo}" class="btn btn-primary">+ Novo Usuário</a>
        </div>

        <!-- Estado vazio — nenhum usuário cadastrado -->
        <div th:if="${#lists.isEmpty(usuarios)}" class="empty-state">
            <div class="empty-icon">👤</div>
            <p>Nenhum usuário cadastrado</p>
        </div>

        <!-- Tabela de usuários -->
        <div th:if="${!#lists.isEmpty(usuarios)}" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Empresa</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.nome}">Nome</td>
                        <td th:text="${u.email}">email@example.com</td>
                        <td>
                            <!--
                            Badges coloridos por role:
                            - ADMIN = vermelho (responsabilidade máxima)
                            - GESTOR = azul (gerencia a empresa)
                            - USUARIO = verde (acesso básico)
                            -->
                            <span class="badge"
                                  th:classappend="${u.role.name() == 'ADMIN'} ? 'badge-role-admin' : (${u.role.name() == 'GESTOR'} ? 'badge-role-gestor' : 'badge-role-usuario')"
                                  th:text="${u.role}">ADMIN</span>
                        </td>
                        <td th:text="${u.empresaNome ?: '—'}">Empresa</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.ativo} ? 'badge-ativo' : 'badge-inativo'"
                                  th:text="${u.ativo} ? 'Ativo' : 'Inativo'">Ativo</span>
                        </td>
                        <td>
                            <div class="btn-group">
                                <a th:href="@{/usuarios/{id}/editar(id=${u.id})}" class="btn btn-secondary btn-sm">Editar</a>
                                <form th:if="${u.ativo}" th:action="@{/usuarios/{id}/desativar(id=${u.id})}" method="post" class="form-desativar">
                                    <button type="submit" class="btn btn-danger btn-sm">Desativar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal-overlay" id="modal-confirmacao">
    <div class="modal-content">
        <h3>Confirmar ação</h3>
        <p>Tem certeza que deseja desativar este usuário? Esta ação pode ser revertida.</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="modal-cancelar">Cancelar</button>
            <button class="btn btn-danger" id="modal-confirmar">Desativar</button>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
