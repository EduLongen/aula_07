<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tag — ClientHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-container">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/messages :: messages}"></div>

        <div class="page-header">
            <h1 th:text="${tag.id != null} ? 'Editar Tag' : 'Nova Tag'">Nova Tag</h1>
        </div>

        <div class="form-container">
            <form th:action="@{/empresas/{id}/tags/salvar(id=${empresa.id})}" th:object="${tag}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" th:field="*{nome}" required
                           th:errorclass="campo-erro" placeholder="Ex: VIP, Novo, Inativo" maxlength="50">
                    <div class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                </div>

                <div class="form-group">
                    <label for="cor">Cor</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="cor" th:field="*{cor}" class="color-input"
                               th:errorclass="campo-erro">
                        <span id="cor-hex" th:text="${tag.cor != null} ? ${tag.cor} : '#007AFF'">#007AFF</span>
                    </div>
                    <div class="error-message" th:if="${#fields.hasErrors('cor')}" th:errors="*{cor}">Erro</div>
                </div>

                <div class="form-group">
                    <label>Preview</label>
                    <div>
                        <span id="tag-preview" class="tag-badge"
                              th:style="'background-color:' + (${tag.cor} != null ? ${tag.cor} : '#007AFF')"
                              th:text="${tag.nome != null and !#strings.isEmpty(tag.nome)} ? ${tag.nome} : 'Sua tag'">Sua tag</span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a th:href="@{/empresas/{id}/tags(id=${empresa.id})}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    // Preview em tempo real: atualiza badge quando muda nome ou cor
    document.addEventListener('DOMContentLoaded', () => {
        const nomeInput = document.getElementById('nome');
        const corInput = document.getElementById('cor');
        const corHex = document.getElementById('cor-hex');
        const preview = document.getElementById('tag-preview');

        function atualizarPreview() {
            const nome = nomeInput.value.trim() || 'Sua tag';
            const cor = corInput.value || '#007AFF';
            preview.textContent = nome;
            preview.style.backgroundColor = cor;
            corHex.textContent = cor.toUpperCase();
        }

        nomeInput.addEventListener('input', atualizarPreview);
        corInput.addEventListener('input', atualizarPreview);
        atualizarPreview();
    });
</script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
