<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cliente — ClientHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-container">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/messages :: messages}"></div>

        <div class="page-header">
            <h1 th:text="${cliente.id != null} ? 'Editar Cliente' : 'Novo Cliente'">Novo Cliente</h1>
        </div>

        <div class="form-container">
            <form th:action="@{/empresas/{id}/clientes/salvar(id=${empresa.id})}" th:object="${cliente}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" th:field="*{nome}" required
                               th:errorclass="campo-erro" placeholder="Nome completo">
                        <div class="error-message" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}">Erro</div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}" required
                               th:errorclass="campo-erro" placeholder="email@exemplo.com">
                        <div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Erro</div>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" th:field="*{telefone}" placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group">
                        <label for="cep">CEP</label>
                        <div class="cep-wrapper">
                            <input type="text" id="cep" th:field="*{cep}"
                                   th:errorclass="campo-erro" placeholder="Digite o CEP para busca automática" maxlength="8">
                            <div class="cep-spinner" id="cep-spinner"></div>
                        </div>
                        <div class="error-message" th:if="${#fields.hasErrors('cep')}" th:errors="*{cep}">Erro</div>
                    </div>

                    <div class="form-group">
                        <label for="logradouro">Logradouro</label>
                        <input type="text" id="logradouro" readonly placeholder="Preenchido pelo CEP">
                    </div>

                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" readonly placeholder="Preenchido pelo CEP">
                    </div>

                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" readonly placeholder="Preenchido pelo CEP">
                    </div>

                    <div class="form-group">
                        <label for="uf">UF</label>
                        <input type="text" id="uf" readonly placeholder="UF" maxlength="2">
                    </div>
                </div>

                <!-- Seção de Tags -->
                <div th:if="${tagsDisponiveis != null and !#lists.isEmpty(tagsDisponiveis)}" class="form-group form-full" style="margin-top: 8px;">
                    <label>Tags</label>
                    <div class="tag-checkbox-group">
                        <label th:each="tag : ${tagsDisponiveis}" class="tag-checkbox-item">
                            <input type="checkbox" name="tagIds"
                                   th:value="${tag.id}"
                                   th:checked="${cliente.tagIds != null and #sets.contains(cliente.tagIds, tag.id)}">
                            <span class="tag-badge" th:style="'background-color:' + ${tag.cor}" th:text="${tag.nome}">Tag</span>
                        </label>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a th:href="@{/empresas/{id}(id=${empresa.id})}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</div>

<div class="modal-overlay" id="modal-confirmacao">
    <div class="modal-content">
        <h3>Confirmar ação</h3>
        <p>Tem certeza que deseja desativar este registro?</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="modal-cancelar">Cancelar</button>
            <button class="btn btn-danger" id="modal-confirmar">Desativar</button>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
