<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ? ${title} + ' — ClientHub' : 'ClientHub'">ClientHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/messages :: messages}"></div>
            <div th:insert="${content}"></div>
        </main>
    </div>

    <!-- Modal de confirmação -->
    <div class="modal-overlay" id="modal-confirmacao">
        <div class="modal-content">
            <h3>Confirmar ação</h3>
            <p>Tem certeza que deseja desativar este registro? Esta ação pode ser revertida.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="modal-cancelar">Cancelar</button>
                <button class="btn btn-danger" id="modal-confirmar">Desativar</button>
            </div>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
