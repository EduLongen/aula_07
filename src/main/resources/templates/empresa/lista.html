<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Empresas — ClientHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-container">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <main class="main-content">
        <div th:replace="~{fragments/messages :: messages}"></div>

        <div class="page-header">
            <h1>Empresas</h1>
            <a th:href="@{/empresas/novo}" class="btn btn-primary">+ Nova Empresa</a>
        </div>

        <div th:if="${#lists.isEmpty(empresas)}" class="empty-state">
            <div class="empty-icon">🏢</div>
            <p>Nenhuma empresa cadastrada</p>
        </div>

        <div th:if="${!#lists.isEmpty(empresas)}" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CNPJ</th>
                        <th>Email</th>
                        <th>Plano</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="empresa : ${empresas}">
                        <td th:text="${empresa.nome}">Nome</td>
                        <td class="cnpj-formatted"
                            th:text="${#strings.substring(empresa.cnpj,0,2) + '.' + #strings.substring(empresa.cnpj,2,5) + '.' + #strings.substring(empresa.cnpj,5,8) + '/' + #strings.substring(empresa.cnpj,8,12) + '-' + #strings.substring(empresa.cnpj,12,14)}">
                            00.000.000/0000-00
                        </td>
                        <td th:text="${empresa.email}">email@example.com</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${empresa.plano.name() == 'BASICO'} ? 'badge-basico' : (${empresa.plano.name() == 'PROFISSIONAL'} ? 'badge-profissional' : 'badge-enterprise')"
                                  th:text="${empresa.plano}">BASICO</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${empresa.ativa} ? 'badge-ativo' : 'badge-inativo'"
                                  th:text="${empresa.ativa} ? 'Ativa' : 'Inativa'">Ativa</span>
                        </td>
                        <td>
                            <div class="btn-group">
                                <a th:href="@{/empresas/{id}(id=${empresa.id})}" class="btn btn-secondary btn-sm">Ver</a>
                                <a th:href="@{/empresas/{id}/editar(id=${empresa.id})}" class="btn btn-secondary btn-sm">Editar</a>
                                <form th:if="${empresa.ativa}" th:action="@{/empresas/{id}/desativar(id=${empresa.id})}" method="post" class="form-desativar">
                                    <button type="submit" class="btn btn-danger btn-sm">Desativar</button>
                                </form>
                                <form th:if="${!empresa.ativa}" th:action="@{/empresas/{id}/ativar(id=${empresa.id})}" method="post">
                                    <button type="submit" class="btn btn-success btn-sm">Ativar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal-overlay" id="modal-confirmacao">
    <div class="modal-content">
        <h3>Confirmar ação</h3>
        <p>Tem certeza que deseja desativar esta empresa? Esta ação pode ser revertida.</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="modal-cancelar">Cancelar</button>
            <button class="btn btn-danger" id="modal-confirmar">Desativar</button>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
